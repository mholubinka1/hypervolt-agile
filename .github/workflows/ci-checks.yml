name: Code Quality Checks

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'main'

jobs:
  checks:
    name: Run all code quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry and export plugin
        run: pip install poetry poetry-plugin-export

      - name: Install project dependencies
        run: poetry install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Validate pyproject.toml
        run: poetry check

      - name: Verify lock file is consistent with pyproject.toml
        run: poetry check --lock

      - name: Verify requirements.txt matches poetry.lock
        run: poetry export -f requirements.txt | diff - requirements.txt

      - name: Type check with mypy
        run: poetry run mypy app

      - name: Check import ordering with isort
        run: poetry run isort --check-only --profile black app

      - name: Check code formatting with black
        run: poetry run black --check app

      - name: Check linting with ruff
        run: poetry run ruff check --no-fix app

      - name: Check markdown links
        run: find . -name "*.md" -not -path "./.git/*" | xargs markdown-link-check --config .markdown-link-check.json

      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security analysis with bandit
        run: poetry run bandit -r -c pyproject.toml
